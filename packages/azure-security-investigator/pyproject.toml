[project]
name = "azure-security-investigator"
version = "0.0.0"
description = "Reserved namespace for the v2 security-persona skill. Stub only in v1; use azure-cost-investigator today."
readme = "../../README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Mindaugas Nakrosis", email = "mindaugasm@intelme.ai" }]
dependencies = [
    "azure-investigator-core",
    "typer>=0.12",
]

[project.scripts]
azure-security-investigator = "azure_security_investigator.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/azure_security_investigator"]
