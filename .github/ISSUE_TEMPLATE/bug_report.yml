name: Bug report
description: Report a bug in the CLI, a collector, a rule, or the report renderer.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Read-only firewall bypasses go through `SECURITY.md` instead, not this template.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A short description of the symptom.
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command and full output
      description: Copy the exact command you ran and the full stderr / stdout. Redact tenant identifiers if needed.
      render: shell
    validations:
      required: true

  - type: input
    id: az_version
    attributes:
      label: Azure CLI version
      description: Output of `az version` (or just the `azure-cli` line).
      placeholder: "2.62.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.12.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: manifest
    attributes:
      label: Relevant manifest.yaml excerpt (if collector-related)
      description: Paste the `collector_results` entry for the failing collector.
      render: yaml

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I have run `azure-investigator doctor` and the failure persists after fixing what it reported.
        - label: I have tried narrowing with `--collector <name>` (or `--rule <id>`) to isolate which family is affected.
        - label: This issue is not a security vulnerability (those go through `SECURITY.md`).
